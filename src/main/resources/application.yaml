spring:
  application:
    name: khi_archive_platform_backend

  # ===============================
  # DATASOURCE (PostgreSQL)
  # ===============================
  datasource:
    url: jdbc:postgresql://localhost:5432/khi_archive_platform_db
    username: khi
    password: ""
    driver-class-name: org.postgresql.Driver
  # ===============================
  # JPA / HIBERNATE
  # ===============================
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  # ===============================
  # WEB MVC / I18N
  # ===============================
  web:
    locale: ckb
    locale-resolver: fixed

  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

  mvc:
    format:
      date: yyyy-MM-dd
      date-time: yyyy-MM-dd HH:mm:ss

  # ===============================
  # JACKSON (JSON)
  # ===============================
  jackson:
    serialization:
      indent_output: true
    default-property-inclusion: non_null
    time-zone: Asia/Baghdad

  # ===============================
  # DEVTOOLS
  # ===============================
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

  # ===============================
  # MULTIPART UPLOAD LIMITS
  # ===============================
  servlet:
    multipart:
      enabled: true
      max-file-size: 1GB
      max-request-size: 1GB
      file-size-threshold: 2MB

  # ===============================
  # REDIS CACHE CONFIGURATION
  # ===============================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 minutes default TTL
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "khi:"

# ===============================
# JWT (ENV SECRET ONLY)
# ===============================
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cookie-name: ${JWT_COOKIE_NAME:khi_auth_token}
  cookie-secure: ${JWT_COOKIE_SECURE:true}
  cookie-http-only: ${JWT_COOKIE_HTTP_ONLY:true}
  cookie-same-site: ${JWT_COOKIE_SAME_SITE:None}
  cookie-path: ${JWT_COOKIE_PATH:/}
  cookie-max-age: ${JWT_COOKIE_MAX_AGE:86400}

# ===============================
# APP CUSTOM CONFIG
# ===============================
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://khi-frontend-production.up.railway.app}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

# ===============================
# AWS S3
# ===============================
aws:
  s3:
    region: us-east-1
    bucket: khi-archive-platform
    base-folder: khi-archive-platform-folders
    person-folder: persons

# ===============================
# SERVER / TOMCAT LIMITS
# ===============================
server:
  forward-headers-strategy: framework
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

  tomcat:
    max-swallow-size: 1GB
    max-http-form-post-size: 1GB
    max-parameter-count: 10000

  # ===============================
  # SERVER COOKIE CONFIGURATION
  # ===============================
  servlet:
    session:
      cookie:
        name: KHI_SESSION
        http-only: true
        secure: true          # HTTPS on Railway
        same-site: Lax        # Allows cookie on auth redirects
        path: /
        max-age: 86400  # 24 hours

# ===============================
# LOGGING
# ===============================
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{traceId}] %-5level %logger{36} - %msg%n"

  level:
    root: INFO
    ak.dev.khi_backend: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.web.servlet: DEBUG
    org.springframework.security: INFO
    org.springframework.data.redis: DEBUG
    org.springframework.cache: DEBUG
    org.springframework.jdbc: DEBUG